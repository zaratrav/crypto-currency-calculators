<!DOCTYPE html>
<html>
<head>
<title>DeFi to Fiat Calculator</title>
<meta name="google-site-verification" content="PkLa_ViOo6FAHpvh8SacceMb95o9tePRdrqLNBz9X1M" />
<link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>DeFi to Fiat Calculator</h1>

<input id="amount" placeholder="Crypto amount">
<input id="rate" placeholder="Exchange rate">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){
 let amt=+amount.value||0;
 let r=+rate.value||0;
 res.innerText="$"+(amt*r).toFixed(2);
}
</script>

</body>
</html>
